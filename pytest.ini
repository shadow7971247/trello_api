[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --alluredir=allure-results
markers =
    smoke: быстрые smoke-тесты
    auth: тесты аутентификации
    boards: тесты досок
    lists: тесты списков
    cards: тесты карточек
    checklists: тесты чек-листов
    members: тесты участников
    ui_setup: создать данные для UI и сохранить test-context.json
    ui_teardown: удалить данные UI по test-context.json
    local: локальный прогон (все тесты без browserstack)
    browserstack: только облако LambdaTest; исключить -m "not browserstack"
